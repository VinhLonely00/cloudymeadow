<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudyMeadow - EcoChill</title>
    
    <link rel="icon" href="favicon.png" type="image/png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="particles-container" id="particles"></div>
    <div class="bg-vignette"></div>

    <nav class="navbar">
        <a href="#" class="nav-logo" id="nav-logo-text">Cloudy<span>Meadow</span></a>
        
        <ul class="nav-menu">
            <li><a href="#hero" id="nav-home">Trang Chủ</a></li>
            <li><a href="#staff" id="nav-staff">Đội Ngũ</a></li>
            <li><a href="#rules" id="nav-rules">Luật Server</a></li>
            <li><a href="#faq" id="nav-faq">Cách Chơi</a></li>
            <li><a href="fish.html" id="nav-fish" style="color: #f1c40f; font-weight: 700; text-transform: uppercase;">Cá</a></li>
            <li><a href="enchant.html" id="nav-enchant" style="color: #7ec2eb; font-weight: 700; text-transform: uppercase;">Phù Phép</a></li>
        </ul>
    </nav>

    <header id="hero">
        <img src="logo.png" alt="Logo" class="hero-logo" id="hero-logo-img">
        <p class="hero-subtitle" id="hero-subtitle">Đang tải...</p>

        <div class="ip-wrapper" onclick="copyIp()">
            <div class="ip-content">
                <i class="fas fa-wifi"></i>
                <span class="ip-text" id="ip-display">cloudymeadow.sytes.net</span>
            </div>
            <div class="ip-action">
                <span id="hero-btn-copy">SAO CHÉP</span>
            </div>
        </div>
        
        <div class="online-status">
            <span class="dot"></span> <span id="player-count">0</span> <span id="hero-online">đang chơi</span>
        </div>

        <div class="social-bar" id="social-container"></div>
    </header>

    <section id="staff">
        <div class="section-header"><h2 id="title-staff">BAN QUẢN TRỊ</h2><div class="gold-line"></div></div>
        <div class="grid-container" id="staff-container"></div>
    </section>

    <section id="rules">
        <div class="section-header"><h2 id="title-rules">LUẬT SERVER</h2><div class="gold-line"></div></div>
        <div class="grid-container" id="rules-container"></div>
    </section>

    <section id="faq">
        <div class="section-header"><h2 id="title-faq">LỆNH & CÁCH CHƠI</h2><div class="gold-line"></div></div>
        <div class="faq-grid" id="faq-container"></div>
    </section>

    <section id="legal">
        <div class="section-header"><h2 id="title-legal">CHÍNH SÁCH</h2></div>
        <div class="legal-box-wrapper">
            <div class="legal-tabs">
                <button class="l-tab active" onclick="openLegal('tos')" id="tab-tos">Điều Khoản</button>
                <button class="l-tab" onclick="openLegal('notice')" id="tab-notice">Bản Quyền</button>
                <button class="l-tab" onclick="openLegal('priv')" id="tab-priv">Bảo Mật</button>
            </div>
            <div class="legal-content">
                <div id="legal-tos" class="l-content active"></div>
                <div id="legal-notice" class="l-content"></div>
                <div id="legal-priv" class="l-content"></div>
            </div>
        </div>
    </section>

    <footer>
        <p class="copyright">&copy; 2026 <span id="footer-name">CloudyMeadow</span>. All Rights Reserved.</p>
    </footer>

    <div id="cm-widget-container" class="cm-widget-hidden">
        <div id="cm-widget-menu" class="cm-widget-menu-closed">
            <a href="support.html" class="cm-widget-item">
                <span class="cm-widget-icon">🛠</span>
                <span class="cm-widget-text">Hỗ trợ trực tiếp</span>
            </a>
            <a href="appeal.html" class="cm-widget-item">
                <span class="cm-widget-icon">⚠️</span>
                <span class="cm-widget-text">Kháng cáo hack</span>
            </a>
        </div>
        <button id="cm-widget-toggle" aria-label="Support Menu">
            <i class="fas fa-comment-dots"></i>
        </button>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
